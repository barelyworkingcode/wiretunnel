# Example wiretunnel WireGuard config. Copy to your own file (e.g.
# wiretunnel.conf) and fill in real values. Generate keys with `wg genkey`
# / `wg pubkey`. NEVER commit a config containing a real PrivateKey.
[Interface]
PrivateKey = <your-base64-private-key>
Address = 10.0.0.2/32
DNS = 10.0.0.1
MTU = 1412

[Peer]
PublicKey = <peer-base64-public-key>
Endpoint = vpn.example.com:51820
AllowedIPs = 0.0.0.0/0
# Recommended when this host should be reachable by the peer (keeps the NAT
# mapping alive); see the README "Verifying ping" note.
PersistentKeepalive = 45
